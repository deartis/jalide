name: jalide
description: "IDE Mobile Multilinguagem."
publish_to: "none"
version: 0.1.0+4

environment:
  sdk: ^3.11.0

dependencies:
  file_picker: ^11.0.2
  shared_preferences: ^2.2.3
  flutter:
    sdk: flutter
  flutter_code_editor: ^0.3.5
  highlight: ^0.7.0
  path: ^1.9.0
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  provider: ^6.1.2
  # Terminal real (PTY nativo)
  flutter_pty: ^0.4.0
  xterm: ^4.0.0
  # SSH / SFTP remoto
  dartssh2: ^2.9.0
  # Armazenamento seguro para credenciais SSH
  flutter_secure_storage: ^9.0.0
  # Requisições HTTP (para buscar chave PIX remota)
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
